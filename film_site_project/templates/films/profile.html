<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Профіль</title>
</head>
<body>
    <h1>Профіль користувача</h1>

    <nav>
        <a href="{% url 'home' %}">Головна</a> |
        <a href="{% url 'film_list' %}">Фільми</a> |
        <a href="{% url 'actor_list' %}">Актори</a>
    </nav>

    <hr>

    <p><strong>Ім’я користувача:</strong> {{ profile.username }}</p>
    <p><strong>Email:</strong> {{ profile.email }}</p>

    <h2>Улюблені фільми</h2>
    {% for film in liked_films %}
        <p>
            <a href="{% url 'film_detail' film.id %}">{{ film.title }}</a>
        </p>
    {% empty %}
        <p>Улюблених фільмів поки немає.</p>
    {% endfor %}
</body>
</html>
