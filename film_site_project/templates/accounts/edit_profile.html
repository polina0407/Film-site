{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Налаштування акаунту</h1>

    <div class="row">
        <!-- Секція редагування даних -->
        <div class="col-md-6">
            <h3>Основна інформація</h3>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ u_form.as_p }}
                {{ p_form.as_p }}
                <button type="submit" name="update_profile" class="btn btn-primary">
                    Зберегти зміни профілю
                </button>
            </form>
        </div>

        <!-- Секція зміни пароля -->
        <div class="col-md-6">
            <h3>Безпека (Зміна пароля)</h3>
            <form method="POST">
                {% csrf_token %}
                {{ pass_form.as_p }}
                <button type="submit" name="change_password" class="btn btn-warning">
                    Оновити пароль
                </button>
            </form>
        </div>
    </div>

    <br>
    <a href="{% url 'film_site_app:profile' %}">Назад до профілю</a>
</div>
{% endblock %}
